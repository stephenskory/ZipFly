name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/run-all-tests.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine virtualenv  # virtualenv needed for clean install test

      - name: Build the package
        run: |
          python -m build  # Produces dist/*.tar.gz and dist/*.whl

      - name: Test built package
        run: |
          python -m venv venv_test
          source venv_test/bin/activate
          pip install --upgrade pip
          pip install dist/*            # Install your built package
          pip install -r dev-requirements.txt  # Install test dependencies
          pytest -m "not slow" --disable-warnings -v

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --skip-existing dist/*
